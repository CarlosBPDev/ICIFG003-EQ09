# ==========================================
# Configuración de la Clínica Odontológica
# ==========================================

# Nombre de la aplicación
spring.application.name=clinica-odontologica

# Puerto del servidor
server.port=8080

# ==========================================
# Configuración de PostgreSQL
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_odontologica
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configuración de JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Configuración de CORS (se maneja en CorsConfig.java)
# ==========================================
