# ==========================================
# Configuración de la Clínica Odontológica
# ==========================================

# Nombre de la aplicación
spring.application.name=clinica-odontologica

# Puerto del servidor
server.port=8080

# ==========================================
# Configuración de PostgreSQL (ACTIVO)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_odontologica
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# IMPORTANTE: Cambiar credenciales si usaste otras en PostgreSQL
# Edita: username y password arriba

spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar SQL en logs (útil para debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Validar entidades
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Inicialización de datos (ejecuta data.sql después de crear tablas)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
