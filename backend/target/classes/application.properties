# ==========================================
# Configuración de la Clínica Odontológica
# ==========================================

# Nombre de la aplicación
spring.application.name=clinica-odontologica

# Puerto del servidor
server.port=8080

# ==========================================
# Configuración de H2 (ACTIVO para facilitar ejecución)
# ==========================================
spring.datasource.url=jdbc:h2:mem:clinica_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Configuración de PostgreSQL (COMENTADO)
# ==========================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_odontologica
# spring.datasource.username=postgres
# spring.datasource.password=1234
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# IMPORTANTE: Cambiar credenciales si usaste otras en PostgreSQL
# Edita: username y password arriba

spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar SQL en logs (útil para debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Validar entidades
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Inicialización de datos (ejecuta data.sql después de crear tablas)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
