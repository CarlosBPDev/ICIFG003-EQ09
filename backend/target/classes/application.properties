# ==========================================
# Configuración de la Clínica Odontológica
# ==========================================

# Nombre de la aplicación
spring.application.name=clinica-odontologica

# Puerto del servidor
server.port=8080

# ==========================================
# Configuración de H2 Database (En memoria)
# ==========================================
spring.datasource.url=jdbc:h2:mem:clinica_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar consola H2 (accesible en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Configuración de PostgreSQL (Deshabilitada por ahora)
# ==========================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_odontologica
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Configuración de JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

